#   parent_scope:
#     parameters: SELECT eleve_id FROM parent_eleves WHERE user_id = request.user_id()
#     data:
#       - SELECT * FROM notes WHERE eleve_id = bucket.eleve_id
#       - SELECT * FROM absences WHERE eleve_id = bucket.eleve_id
