<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 165">
  <defs>
    <clipPath id="hc">
      <polygon points="75,20 127,50 127,110 75,140 23,110 23,50"/>
    </clipPath>
  </defs>

  <!-- Fond sombre -->
  <rect width="150" height="165" rx="33" fill="#0A1628"/>

  <!-- Hexagone -->
  <polygon points="75,20 127,50 127,110 75,140 23,110 23,50" fill="#F8FAF9"/>

  <!-- Livres clippés dans l'hexagone -->
  <g clip-path="url(#hc)">
    <rect x="26" y="42" width="42" height="84" rx="5" fill="#00C48C" transform="rotate(-8,47,84)"/>
    <rect x="72" y="42" width="42" height="84" rx="5" fill="#00A876" transform="rotate(8,93,84)"/>
    <rect x="71" y="44" width="8" height="80" fill="#F8FAF9" opacity="0.18"/>
  </g>

  <!-- Étoile dorée -->
  <circle cx="108" cy="36" r="8" fill="#FFB547"/>
  <line x1="108" y1="18" x2="108" y2="27" stroke="#FFB547" stroke-width="4" stroke-linecap="round"/>
  <line x1="108" y1="45" x2="108" y2="54" stroke="#FFB547" stroke-width="4" stroke-linecap="round"/>
  <line x1="90"  y1="36" x2="99"  y2="36" stroke="#FFB547" stroke-width="4" stroke-linecap="round"/>
  <line x1="117" y1="36" x2="126" y2="36" stroke="#FFB547" stroke-width="4" stroke-linecap="round"/>
</svg>
