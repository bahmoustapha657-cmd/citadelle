<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO -->
    <title>EduGest — Gestion Scolaire Intelligente</title>
    <meta name="description" content="EduGest — Plateforme de gestion scolaire intelligente pour l'Afrique" />

    <!-- Icône navigateur -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA — Manifest & icônes -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EduGest" />

    <!-- PWA — Couleur de thème (barre navigateur Android) -->
    <meta name="theme-color" content="#0A1628" />

    <!-- Open Graph -->
    <meta property="og:title" content="EduGest — Gestion Scolaire" />
    <meta property="og:description" content="Solution SaaS de gestion scolaire pour l'Afrique" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Enregistrement du Service Worker PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .catch(() => {}); // Silencieux si échec (dev HTTP)
        });
      }
    </script>
  </body>
</html>
